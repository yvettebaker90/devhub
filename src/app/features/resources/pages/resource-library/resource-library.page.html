<section class="min-h-screen bg-slate-50 px-4 py-8 sm:px-6 lg:px-8">
  <div class="mx-auto grid w-full max-w-6xl gap-6">
    <app-header />

    <app-search-bar (searchChanged)="updateSearch($event)" />

    <div class="grid gap-6 lg:grid-cols-[260px_1fr]">
      <app-filter-sidebar (categoryChanged)="updateCategory($event)" />

      <div class="grid gap-4 sm:grid-cols-2">
        @for (resource of filteredResources(); track resource.title) {
          <app-resource-card
            [title]="resource.title"
            [description]="resource.description"
            [category]="resource.category"
            [level]="resource.level"
            [link]="resource.link"
          />
        } @empty {
          <p class="rounded-xl border border-slate-200 bg-white p-4 text-sm text-slate-600">
            No resources match your filters yet.
          </p>
        }
      </div>
    </div>
  </div>
</section>
