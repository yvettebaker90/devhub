<article class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm transition hover:shadow-md">
  <div class="flex items-center justify-between gap-2">
    <h3 class="text-lg font-semibold text-slate-900">{{ title() }}</h3>
    <span class="rounded-full bg-sky-100 px-2.5 py-1 text-xs font-medium text-sky-700">
      {{ category() }}
    </span>
  </div>

  <p class="mt-2 text-sm text-slate-600">{{ description() }}</p>

  <div class="mt-4 flex items-center justify-between">
    <span class="text-xs font-medium uppercase tracking-wide text-slate-500">
      {{ level() }}
    </span>
    <a
      [href]="link()"
      class="text-sm font-medium text-sky-700 underline-offset-4 hover:underline"
      target="_blank"
      rel="noreferrer"
    >
      Open resource
    </a>
  </div>
</article>
