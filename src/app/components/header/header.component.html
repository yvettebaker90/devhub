<header class="bg-black border-b border-gray-800">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <!-- Logo and Navigation -->
      <div class="flex items-center gap-8">
        <a routerLink="/" class="flex items-center gap-2">
          <div class="flex items-center justify-center w-8 h-8 bg-linear-to-br from-purple-500 to-purple-600 rounded-lg text-white font-bold text-lg">
            D
          </div>
          <span class="text-white font-semibold text-lg">DevHub</span>
        </a>

        <!-- Navigation (Desktop) -->
        <nav class="hidden md:flex items-center gap-6">
          <a 
            href="#" 
            class="text-gray-400 hover:text-white transition-colors duration-200 text-sm font-medium"
          >
            Browse
          </a>
        </nav>
      </div>

      <!-- Desktop Sign In Button -->
      <div class="hidden md:block">
        <button 
          routerLink="/dashboard"
          class="px-4 py-2 text-white text-sm font-medium border border-gray-600 rounded-lg hover:border-gray-400 hover:bg-gray-900 transition-all duration-200"
        >
          Sign in
        </button>
      </div>

      <!-- Hamburger Menu (Mobile) -->
      <button 
      title="Toggle menu"
      type="button"
        (click)="toggleMenu()"
        class="md:hidden text-white"
      >
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
      </button>
    </div>

    <!-- Mobile Menu -->
    <div *ngIf="isMenuOpen" class="md:hidden border-t border-gray-800 py-4 space-y-4">
      <a 
        href="#" 
        class="block text-gray-400 text-sm font-medium"
      >
        Browse
      </a>
      <a 
        routerLink="/dashboard"
        class="block text-gray-400 text-sm font-medium"
      >
        Sign in
      </a>
    </div>
  </div>
</header>
