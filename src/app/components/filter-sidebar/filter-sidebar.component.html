<aside
  class="h-fit rounded-md border border-white/10 bg-[#0b1220] p-6 text-white"
>
  <!-- TITLE -->
  <h2 class="mb-6 text-lg font-semibold">Filters</h2>

  <!-- 🧩 CATEGORY -->
  <div class="mb-6">
    <h3 class="mb-3 text-xs font-semibold uppercase tracking-widest text-slate-400">
      Category
    </h3>

    <div class="space-y-2">
      <label class="flex items-center gap-2 text-sm">
        <input
          type="checkbox"
          class="accent-violet-500"
          (change)="onCategoryChange('Angular', $any($event.target).checked)"
        />
        Angular
      </label>

      <label class="flex items-center gap-2 text-sm">
        <input
          type="checkbox"
          class="accent-violet-500"
          (change)="onCategoryChange('TypeScript', $any($event.target).checked)"
        />
        TypeScript
      </label>

      <label class="flex items-center gap-2 text-sm">
        <input
          type="checkbox"
          class="accent-violet-500"
          (change)="onCategoryChange('CSS', $any($event.target).checked)"
        />
        CSS
      </label>
    </div>
  </div>

  <!-- 📚 TYPE -->
  <div class="mb-6">
    <h3 class="mb-3 text-xs font-semibold uppercase tracking-widest text-slate-400">
      Type
    </h3>

    <div class="space-y-2">
      <label class="flex items-center gap-2 text-sm">
        <input
          type="checkbox"
          class="accent-violet-500"
          (change)="onTypeChange('Article', $any($event.target).checked)"
        />
        Article
      </label>

      <label class="flex items-center gap-2 text-sm">
        <input
          type="checkbox"
          class="accent-violet-500"
          (change)="onTypeChange('Video', $any($event.target).checked)"
        />
        Video
      </label>

      <label class="flex items-center gap-2 text-sm">
        <input
          type="checkbox"
          class="accent-violet-500"
          (change)="onTypeChange('Course', $any($event.target).checked)"
        />
        Course
      </label>
    </div>
  </div>

  <!-- 🎯 LEVEL -->
  <div>
    <h3 class="mb-3 text-xs font-semibold uppercase tracking-widest text-slate-400">
      Level
    </h3>

    <div class="space-y-2">
      <label class="flex items-center gap-2 text-sm">
        <input
          type="checkbox"
          class="accent-violet-500"
          (change)="onLevelChange('Beginner', $any($event.target).checked)"
        />
        Beginner
      </label>

      <label class="flex items-center gap-2 text-sm">
        <input
          type="checkbox"
          class="accent-violet-500"
          (change)="onLevelChange('Intermediate', $any($event.target).checked)"
        />
        Intermediate
      </label>

      <label class="flex items-center gap-2 text-sm">
        <input
          type="checkbox"
          class="accent-violet-500"
          (change)="onLevelChange('Job Ready', $any($event.target).checked)"
        />
        Job Ready
      </label>
    </div>
  </div>
</aside>
