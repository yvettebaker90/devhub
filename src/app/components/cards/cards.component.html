<article
  class="rounded-md border border-white/10 bg-[#0b1220] p-7 text-white shadow-[0_20px_60px_rgba(0,0,0,0.35)] transition hover:-translate-y-1 hover:border-violet-500/30"
>
  <div class="mb-5 flex items-start justify-between gap-4">
    <div class="flex flex-wrap gap-2">
      <span [class]="categoryBadgeClass()">
        {{ category() }}
      </span>

      @if (language()) {
        <span [class]="languageBadgeClass()">
          {{ language() }}
        </span>
      }
 
      <span [class]="levelBadgeClass()">
        {{ level() }}
      </span>
    </div>

    <div class="flex flex-col items-end gap-2">
      <span [class]="typeBadgeClass()">
        {{ type() }}
      </span>

      @if (isCommunityPick()) {
        <span
          class="rounded-full border border-yellow-300/20 bg-yellow-300/10 px-3 py-1 text-xs font-bold text-yellow-200"
        >
          COMMUNITY PICK
        </span>
      }
    </div>
  </div>
 
  <h3 class="mb-3 text-left text-2xl font-bold leading-tight md:text-3xl">
    {{ title() }}
  </h3>
 
  <p class="mb-6 text-left text-sm leading-7 text-slate-300 md:text-base">
    {{ description() }}
  </p>
 
  <div class="flex flex-col gap-4 border-t border-white/10 pt-5 sm:flex-row sm:items-center sm:justify-between">
    <p class="text-left text-sm text-slate-400">
      Added by <span class="font-medium text-slate-200">{{ author() }}</span>
      on <span class="text-slate-300">{{ date() | date:'longDate' }}</span>
    </p>

    <a
      [href]="link()"
      class="inline-flex w-fit items-center rounded-xl bg-violet-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-violet-500"
    >
      View resource
      <span class="ml-2"
        ><svg
          xmlns="http://www.w3.org/2000/svg"
          width="15"
          height="15"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M14 3h7v7" />
          <path d="M10 14L21 3" />
          <path d="M21 14v4a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
        </svg>
      </span>
    </a>
  </div>
</article>
