<article
  class="rounded-md border border-white/10 bg-[#0b1220] p-7 text-white shadow-[0_20px_60px_rgba(0,0,0,0.35)] transition hover:-translate-y-1 hover:border-violet-500/30"
>
  <div class="mb-5 flex items-start justify-between gap-4">
    <div class="flex flex-wrap gap-2">
      <span
        class="rounded-full border border-blue-400/20 bg-blue-400/10 px-3 py-1 text-xs font-semibold text-blue-300"
      >
        {{ category() }}
      </span>
 
      <span
        class="rounded-full border border-yellow-400/20 bg-yellow-400/10 px-3 py-1 text-xs font-semibold text-yellow-300"
      >
        {{ level() }}
      </span>
    </div>

    <div class="flex flex-col items-end gap-2">
      <span
        class="rounded-full border border-purple-400/20 bg-purple-400/10 px-3 py-1 text-xs font-semibold text-purple-300"
      >
        {{ type() }}
      </span>

      @if (isCommunityPick()) {
        <span
          class="rounded-full border border-yellow-300/20 bg-yellow-300/10 px-3 py-1 text-xs font-bold text-yellow-200"
        >
          COMMUNITY PICK
        </span>
      }
    </div>
  </div>
 
  <h3 class="mb-4 text-2xl font-bold leading-tight md:text-3xl">
    {{ title() }}
  </h3>
 
  <p class="mb-6 text-sm leading-7 text-slate-300 md:text-base">
    {{ description() }}
  </p>
 
  <div class="border-t border-white/10 pt-4">
    <a
      [href]="link()"
      class="inline-flex rounded-xl bg-violet-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-violet-500"
    >
      View resource
    </a>
  </div>
</article>
