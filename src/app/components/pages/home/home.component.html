<section class="min-h-screen bg-[#0a0a0a]">
  <app-hero></app-hero>
  <div class="mx-auto mt-10 grid w-full max-w-7xl gap-6">

    <div class="grid gap-6 lg:grid-cols-[260px_1fr]">
      <app-filter-sidebar (filterChanged)="updateFilters($event)" />

      <div class="flex flex-col gap-6">
        @for (resource of filteredResources(); track resource.title) {
          <app-resource-card
            [title]="resource.title"
            [description]="resource.description"
            [category]="resource.category"
            [language]="resource.language ?? ''"
            [level]="resource.level"
            [link]="resource.link"
            [type]="resource.type"
          />
        } @empty {
          <p class="rounded-xl p-4 text-sm text-white">
            No resources match your filters yet.
          </p>
        }
      </div>
    </div>
  </div>
</section>
