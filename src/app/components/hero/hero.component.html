<section
    class="bg-linear-to-b from-black to-slate-900 min-h-[78vh] flex flex-col items-center justify-start pt-8 md:pt-10 m-0 px-4 sm:px-6 lg:px-8">
    <div class="w-full max-w-3xl mx-auto">
        <!-- Heading -->
        <div class="text-center mb-4 mt-10">
            <h1 class="text-5xl md:text-6xl font-bold text-white mb-6 leading-tight">
                Find the resources that make you job-ready
            </h1>
            <p class="text-lg text-gray-400 mb-8 leading-relaxed">
                Discover curated learning resources handpicked by the developer community. From beginner tutorials to
                advanced courses, everything you need to level up your career.
            </p>
        </div>

        <!-- Sign in Button -->
        <div class="flex justify-center mb-12">
            <button routerLink="/signin" aria-label="Sign in to contribute"
                class="px-6 py-3 text-white text-sm font-medium border border-gray-600 rounded-lg hover:border-gray-400 hover:bg-gray-900 transition-all duration-200">
                Sign in to contribute
            </button>
        </div>

        <!-- Search Box -->
        <div class="mb-12 max-w-xl mx-auto">
            <label for="search-resources" class="sr-only">Search resources</label>
            <div class="relative">
                <svg class="absolute left-4 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-500" fill="none"
                    stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
                <input id="search-resources" type="text" placeholder="Search resources..."
                    class="w-full pl-12 pr-4 py-3 bg-gray-900 border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-gray-500 transition-colors" />
            </div>
        </div>

        <!-- Tags -->
        <div class="flex flex-col md:flex-row items-center justify-center gap-4">
            <p class="text-gray-400 text-sm">Popular:</p>
            <div class="flex flex-wrap gap-3 justify-center">
                <button *ngFor="let tag of tags" (click)="selectTag(tag.name)" [attr.aria-pressed]="tag.active"
                    [attr.aria-label]="'Filter by ' + tag.name + (tag.active ? ' (selected)' : '')"
                    [class.border-purple-500]="tag.active" [class.text-white]="tag.active"
                    [class.bg-gray-900]="tag.active"
                    class="px-4 py-2 border border-gray-700 rounded-full text-gray-400 text-sm font-medium hover:text-white transition-all duration-200">
                    {{ tag.name }}
                </button>
            </div>
        </div>
    </div>
</section>
